### model
model_name_or_path: /home/users/nus/e1554733/scratch/models/Qwen/Qwen2.5-VL-7B-Instruct
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
# lora_target: all
lora_target: q_proj,v_proj,k_proj,o_proj,fc_in,fc_out
additional_target: visual.merger

### dataset
dataset: scale_reasoner_sft_train
eval_dataset: scale_reasoner_sft_val
# max_samples: 100  # for quick test
template: qwen2_vl
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### train
do_train: true
num_train_epochs: 10.0
# num_train_epochs: 3.0 # for quick test
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
do_eval: true
eval_on_start: true
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 25

### logging
report_to:
  - wandb
run_name: sft_lora_qwen25vl_des_think
logging_strategy: steps
logging_steps: 5
logging_first_step: true
plot_loss: true

### output
output_dir: /home/users/nus/e1554733/workenv/ScaleReasoner/sft-results/checkpoints/triplet_mcq_batch2/sft_lora_qwen25vl_des_think
save_strategy: steps
save_steps: 100
save_only_model: false
load_best_model_at_end: true






